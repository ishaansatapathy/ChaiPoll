<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiPoll Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero" aria-label="ChaiPoll landing hero">
      <div class="scene" aria-hidden="true">
        <div class="scene-image"></div>
        <div class="ambient-glow"></div>
        <div class="grid-layer"></div>
      </div>

      <div class="spotlight" aria-hidden="true"></div>

      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="#">
          <span class="brand-mark">C</span>
          <span>ChaiPoll</span>
        </a>
        <div class="nav-actions">
          <a href="#">Login</a>
          <a class="nav-button" href="#">Start free</a>
        </div>
      </nav>

      <section class="hero-content">
        <p class="eyebrow">Realtime polling for teams</p>
        <h1>
          Create
          <span class="highlight-word">
            <span class="corner corner-tl"></span>
            <span class="corner corner-tr"></span>
            <span class="corner corner-bl"></span>
            <span class="corner corner-br"></span>
            Polls
          </span>
          That<br />
          People Want To Answer
        </h1>
        <p class="hero-copy">
          Build elegant public polls, collect feedback through shareable links,
          and watch your analytics update as responses arrive.
        </p>
        <div class="hero-actions">
          <a class="primary-action" href="#">Create a poll</a>
          <a class="secondary-action" href="#">View analytics</a>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
